services:
  - type: web
    name: uts-hunters
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run uts_hunters_pro.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /
    autoDeploy: true
